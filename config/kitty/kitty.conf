# ═══════════════════════════════════════════════════════════════
# KITTY TERMINAL CONFIGURATION
# Dark Purple & Cream Edition - Complements Neovim Tokyo Night Blue
# ═══════════════════════════════════════════════════════════════

# Theme
include mocha.conf

# ═══════════════════════════════════════════════════════════════
# FONT CONFIGURATION
# ═══════════════════════════════════════════════════════════════
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size 13.0

# Font features & adjustments
disable_ligatures never
font_features JetBrainsMonoNerdFont-Regular +liga +calt
adjust_column_width 0
adjust_baseline 0

# ═══════════════════════════════════════════════════════════════
# TRANSPARENCY & BLUR - Lighter for Background Image Visibility
# ═══════════════════════════════════════════════════════════════
background_opacity 0.88
dynamic_background_opacity yes
background_blur 48
background_tint 0.90

# Background Image Settings - More visible now
background_image /home/trakotoz/Pictures/madara.jpg
background_image_layout scaled
background_image_linear no

# ═══════════════════════════════════════════════════════════════
# WINDOW CONFIGURATION
# ═══════════════════════════════════════════════════════════════
remember_window_size yes
initial_window_width 1200
initial_window_height 700
window_padding_width 16
window_margin_width 0
single_window_margin_width -1
placement_strategy center

# Window borders - Dark Purple
draw_minimal_borders yes
window_border_width 1.0
active_border_color #8b7ec8
inactive_border_color #2d2639

# Window decorations
hide_window_decorations no
confirm_os_window_close 1
resize_debounce_time 0.1

# ═══════════════════════════════════════════════════════════════
# TAB BAR - Separator Style with Purple & Cream
# ═══════════════════════════════════════════════════════════════
tab_bar_edge top
# tab_bar_style separator
# tab_separator " ┇ "
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align center
tab_bar_min_tabs 2

tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_title_template " {fmt.fg._a594d4}{sup.index} {fmt.fg._f5ebe0}{title} "

# Tab bar colors - Purple & Cream themed
active_tab_foreground   #f5ebe0
active_tab_background   #4a3d5c
active_tab_font_style   bold-italic
inactive_tab_foreground #a599b8
inactive_tab_background #1e1a26
inactive_tab_font_style normal

tab_bar_background #181420
tab_bar_margin_color #181420

# Tab bar spacing
tab_bar_margin_width 8
tab_bar_margin_height 6 2

# Tab activity indicator
tab_activity_symbol "󰂚 "

# ═══════════════════════════════════════════════════════════════
# CURSOR - Underline Style from V2
# ═══════════════════════════════════════════════════════════════
cursor_shape beam
cursor_underline_thickness 3.0
cursor_blink_interval 0.6
cursor_stop_blinking_after 20.0

# ═══════════════════════════════════════════════════════════════
# SCROLLBACK
# ═══════════════════════════════════════════════════════════════
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 5.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0

# ═══════════════════════════════════════════════════════════════
# MOUSE
# ═══════════════════════════════════════════════════════════════
mouse_hide_wait 3.0
url_color #a594d4
url_style double
open_url_with default
detect_urls yes
copy_on_select yes
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#
click_interval -1.0
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam

# ═══════════════════════════════════════════════════════════════
# PERFORMANCE
# ═══════════════════════════════════════════════════════════════
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ═══════════════════════════════════════════════════════════════
# BELL
# ═══════════════════════════════════════════════════════════════
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab "● "
command_on_bell none
bell_path none

# ═══════════════════════════════════════════════════════════════
# ADVANCED
# ═══════════════════════════════════════════════════════════════
allow_remote_control yes
listen_on none
shell_integration enabled
term xterm-256color
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 512

# ═══════════════════════════════════════════════════════════════
# OS SPECIFIC
# ═══════════════════════════════════════════════════════════════
# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in all
macos_thicken_font 0.15
macos_traditional_fullscreen no
macos_colorspace srgb

# Linux specific
linux_display_server auto
wayland_titlebar_color background

# ═══════════════════════════════════════════════════════════════
# KEYBOARD SHORTCUTS
# ═══════════════════════════════════════════════════════════════
clear_all_shortcuts no
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection
map shift+insert paste_from_selection

# Windows
map kitty_mod+enter new_window_with_cwd
map kitty_mod+n new_os_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+` move_window_to_top
map kitty_mod+r start_resizing_window
map kitty_mod+1 first_window
map kitty_mod+2 second_window
map kitty_mod+3 third_window
map kitty_mod+4 fourth_window
map kitty_mod+5 fifth_window

# Tabs
map kitty_mod+t new_tab_with_cwd
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map kitty_mod+. move_tab_forward
map kitty_mod+, move_tab_backward
map kitty_mod+alt+t set_tab_title

# Layouts
map kitty_mod+l next_layout
map kitty_mod+z toggle_layout stack

# Font size
map kitty_mod+equal change_font_size all +2.0
map kitty_mod+plus change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0
map kitty_mod+0 change_font_size all 0
map kitty_mod+backspace change_font_size all 0

# Opacity controls
map kitty_mod+a>m set_background_opacity +0.1
map kitty_mod+a>l set_background_opacity -0.1
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default

# Scrollback
map kitty_mod+k scroll_line_up
map kitty_mod+j scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end
map kitty_mod+h show_scrollback
map kitty_mod+g show_last_command_output

# Search
map kitty_mod+/ launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R

# Miscellaneous
map kitty_mod+f11 toggle_fullscreen
map kitty_mod+f10 toggle_maximized
map kitty_mod+u kitten unicode_input
map kitty_mod+e open_url_with_hints
map kitty_mod+p>f kitten hints --type path --program -
map kitty_mod+p>shift+f kitten hints --type path
map kitty_mod+p>l kitten hints --type line --program -
map kitty_mod+p>w kitten hints --type word --program -
map kitty_mod+p>h kitten hints --type hash --program -
map kitty_mod+p>n kitten hints --type linenum

# Reload config
map kitty_mod+f5 load_config_file
map kitty_mod+f6 debug_config

# ═══════════════════════════════════════════════════════════════
# LAYOUTS
# ═══════════════════════════════════════════════════════════════
enabled_layouts stack,tall,fat,grid,horizontal,vertical

# ═══════════════════════════════════════════════════════════════
# ADDITIONAL TWEAKS
# ═══════════════════════════════════════════════════════════════
update_check_interval 0
confirm_os_window_close 1
close_on_child_death no
shell .
editor .
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# ═══════════════════════════════════════════════════════════════
# END OF CONFIGURATION
# ═══════════════════════════════════════════════════════════════
